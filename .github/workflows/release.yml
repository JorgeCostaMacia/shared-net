# Release: when a v* tag is pushed (by the GitFlow release/hotfix finish), create the
# matching GitHub Release with auto-generated notes. Publishing to NuGet is handled
# separately by main.yml (on push to main). No manual step needed.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
