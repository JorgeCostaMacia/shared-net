# Integration pipeline: build, test and verify packaging on develop and pull requests (no publish).
name: Develop

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

env:
  CONFIGURATION: Release
  SOLUTION: shared-net.slnx

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          clean: true
      - name: Convention guard — explicit types
        # The .editorconfig can't flag target-typed new()/implicit new[] (the analyzer never reports the
        # implicit form), so they drift silently. This grep fails the build if any reappear — spell the type out.
        run: |
          if grep -rnE '\bnew\(|new\[\]' --include='*.cs' --exclude-dir=obj --exclude-dir=bin src test | grep -vE ': new\(\)'; then
            echo "::error::Target-typed 'new(' or implicit 'new[]' found — the convention requires explicit types (write 'new Type(...)'). See AGENTS.md."
            exit 1
          fi
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c ${{ env.CONFIGURATION }}
      - name: Test
        run: dotnet test ${{ env.SOLUTION }} -c ${{ env.CONFIGURATION }} --no-build
      - name: Pack
        run: dotnet pack ${{ env.SOLUTION }} -c ${{ env.CONFIGURATION }} --no-build -o nuget
