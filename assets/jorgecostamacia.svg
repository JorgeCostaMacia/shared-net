<svg width="256" height="256" viewBox="0 0 256 256" role="img" xmlns="http://www.w3.org/2000/svg">
<title>JorgeCostaMacia</title>
<desc>Flat-top hexagon with a node at each vertex and short circuit traces on the sides, with a bold metallic JCM monogram centred, in steel blue on white.</desc>
<defs>
