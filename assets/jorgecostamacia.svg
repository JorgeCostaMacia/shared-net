<linearGradient id="jc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a9c4de"/><stop offset="0.5" stop-color="#4f78a1"/><stop offset="1" stop-color="#213d5c"/></linearGradient>
</defs>
<rect x="6" y="6" width="244" height="244" rx="56" fill="#ffffff"/>
<g stroke="url(#hx)" stroke-width="6" stroke-linecap="round">
<line x1="48" y1="128" x2="24" y2="128"/>
<line x1="208" y1="128" x2="232" y2="128"/>
</g>
<polygon points="208,128 168,59 88,59 48,128 88,197 168,197" fill="none" stroke="url(#hx)" stroke-width="7" stroke-linejoin="round"/>
