<circle cx="168" cy="59" r="10" fill="url(#hx)"/><circle cx="168" cy="59" r="4" fill="#ffffff"/>
<circle cx="88" cy="59" r="10" fill="url(#hx)"/><circle cx="88" cy="59" r="4" fill="#ffffff"/>
<circle cx="48" cy="128" r="10" fill="url(#hx)"/><circle cx="48" cy="128" r="4" fill="#ffffff"/>
<circle cx="88" cy="197" r="10" fill="url(#hx)"/><circle cx="88" cy="197" r="4" fill="#ffffff"/>
<circle cx="168" cy="197" r="10" fill="url(#hx)"/><circle cx="168" cy="197" r="4" fill="#ffffff"/>
<circle cx="24" cy="128" r="6" fill="url(#hx)"/>
<circle cx="232" cy="128" r="6" fill="url(#hx)"/>
</g>
<text x="128" y="150" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="62" letter-spacing="1" fill="url(#jc)" stroke="#1b3a59" stroke-width="0.8">JCM</text>
