<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="shared-net">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161E2B"/><stop offset="1" stop-color="#0B0F17"/></linearGradient>
    <linearGradient id="bgshared" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#2A3850"/><stop offset="1" stop-color="#1A2433"/></linearGradient>
    <linearGradient id="hexFshared" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33425C" stop-opacity="0.55"/><stop offset="1" stop-color="#33425C" stop-opacity="0.10"/></linearGradient>
    <linearGradient id="panelFshared" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3F7FC"/><stop offset="1" stop-color="#DEE8F4"/></linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#card)"/>

  <!-- faint hexagon motif on the right -->
  <g transform="translate(980,320) scale(3.1)" opacity="0.6">
    <polygon points="100,0 86.6,50 -86.6,50 -100,0 -86.6,-50 86.6,-50" fill="none" stroke="#E0A22B" stroke-opacity="0.10" stroke-width="1.2"/>
    <polygon points="80,0 69.3,40 -69.3,40 -80,0 -69.3,-40 69.3,-40" fill="none" stroke="#5A6E92" stroke-opacity="0.10" stroke-width="1"/>
  </g>

  <!-- icon tile (the shared app icon), scaled to 320px -->
  <g transform="translate(120,160) scale(1.25)">
    <rect width="256" height="256" rx="60" fill="url(#bgshared)"/>
    <g transform="translate(128,128) scale(1.2) translate(-128,-128)">
      <polygon points="228.0,128.0 178.0,214.6 78.0,214.6 28.0,128.0 78.0,41.4 178.0,41.4" fill="url(#hexFshared)"/>
      <polygon points="228.0,128.0 178.0,214.6 78.0,214.6 28.0,128.0 78.0,41.4 178.0,41.4" fill="none" stroke="#E0A22B" stroke-opacity="0.60" stroke-width="2"/>
      <polygon points="206.0,128.0 167.0,195.5 89.0,195.5 50.0,128.0 89.0,60.5 167.0,60.5" fill="none" stroke="#E0A22B" stroke-opacity="0.28" stroke-width="1.5"/>
      <g transform="translate(0,6)"><rect x="76" y="61" width="104" height="128" rx="18" fill="#0B0F17" opacity="0.45"/><rect x="76" y="58" width="104" height="128" rx="18" fill="url(#panelFshared)" stroke="#FFFFFF" stroke-opacity="0.90" stroke-width="1.5"/><rect x="76" y="58" width="104" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.40"/><circle cx="94" cy="76" r="4" fill="#E0A22B"/><line x1="90" y1="92" x2="166" y2="92" stroke="#CAD3E0" stroke-opacity="1" stroke-width="1.5"/><path d="M94 109 L104 116 L94 123" stroke="#E0A22B" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="112" y="108" width="11" height="16" rx="2" fill="#E0A22B"/><rect x="94" y="142" width="52" height="8" rx="4" fill="#909EB5"/><rect x="110" y="164" width="38" height="8" rx="4" fill="#909EB5"/></g>
    </g>
    <rect x="1.5" y="1.5" width="253" height="253" rx="58.5" fill="none" stroke="#fff" stroke-opacity="0.42" stroke-width="2"/>
  </g>

  <!-- text block -->
  <text x="548" y="296" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="104" font-weight="700" fill="#FFFFFF">shared-net</text>
  <text x="552" y="352" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" fill="#AEB9CC">Self-contained .NET building blocks</text>
  <text x="552" y="410" font-family="Consolas, ui-monospace, monospace" font-size="32" fill="#E0A22B">JorgeCostaMacia.*</text>
  <text x="552" y="470" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" fill="#6E7C92">DDD building blocks &#183; value objects &#183; utilities &#183; .NET 8 / 9 / 10</text>
